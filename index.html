<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cobros — Progreso Digital</title>
<style>
  :root {
    --bg:#F6F7F5; --card:#fff; --ink:#101613; --mut:#6B7570; --line:#E3E7E4;
    --green:#0B6B4F; --greensoft:#E6F2ED; --owner:#123C63; --amber:#B45309;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:'Segoe UI',system-ui,sans-serif; padding:0 16px 48px; }
  .wrap { max-width:560px; margin:0 auto; padding-top:28px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:14px; }
  .btn { background:var(--green); color:#fff; border:none; border-radius:10px; padding:12px 18px; font-size:15px; font-weight:600; cursor:pointer; width:100%; }
  .btn:disabled { opacity:.4; }
  .ghost { background:transparent; color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:10px 16px; font-size:14px; cursor:pointer; }
  input, select { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--line); font-size:15px; margin-bottom:12px; background:#FBFCFB; color:var(--ink); outline:none; }
  label { font-size:12px; font-weight:600; color:var(--mut); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; display:block; }
  .num { font-family:'Courier New',monospace; font-weight:700; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .toggle { border:1px solid var(--line); background:transparent; border-radius:10px; padding:10px; font-size:14px; cursor:pointer; }
  .toggle.on { background:var(--greensoft); border-color:var(--green); color:var(--green); font-weight:600; }
  .split { display:flex; height:14px; border-radius:14px; overflow:hidden; background:var(--line); }
  .split > div { transition:width .3s ease; }
  .splitlbl { display:flex; justify-content:space-between; margin-top:6px; font-size:12px; color:var(--mut); }
  .linkbox { background:var(--greensoft); border-radius:10px; padding:14px; word-break:break-all; font-size:13px; margin:10px 0; }
  .status { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { font-size:13px; color:var(--mut); margin-bottom:18px; }
  .err { color:#B42318; font-size:13px; margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Cobros</h1>
  <div class="sub">Progreso Digital · Mercado Pago</div>

  <div class="card">
    <label>Nuevo cobro</label>
    <input id="nombre" placeholder="Nombre del proyecto" />
    <input id="cliente" placeholder="Cliente" />
    <input id="email" placeholder="Email del cliente (opcional)" type="email" />
    <label>Monto (ARS)</label>
    <input id="monto" placeholder="450000" inputmode="numeric" />
    <div class="row" style="margin-bottom:12px">
      <button class="toggle on" id="btnMensual" onclick="setRec(true)">Mensual</button>
      <button class="toggle" id="btnUnico" onclick="setRec(false)">Pago único</button>
    </div>

    <label>Distribución (referencia interna)</label>
    <input type="range" min="0" max="100" value="60" id="slider" style="accent-color:var(--green); margin:4px 0 10px" oninput="drawSplit()" />
    <div class="split"><div id="sTeam" style="background:var(--green)"></div><div id="sOwner" style="background:var(--owner)"></div></div>
    <div class="splitlbl"><span id="lblTeam"></span><span id="lblOwner"></span></div>

    <button class="btn" id="crear" style="margin-top:16px" onclick="crear()">Generar link de pago</button>
    <div class="err" id="error"></div>
    <div id="resultado"></div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center">
      <label style="margin:0">Suscripciones activas</label>
      <button class="ghost" onclick="cargarEstado()">Actualizar</button>
    </div>
    <div id="lista" style="margin-top:12px; font-size:14px; color:var(--mut)">Tocá "Actualizar" para ver el estado.</div>
  </div>
</div>

<script>
let recurrente = true;

function setRec(v) {
  recurrente = v;
  document.getElementById('btnMensual').classList.toggle('on', v);
  document.getElementById('btnUnico').classList.toggle('on', !v);
}

function drawSplit() {
  const t = Number(document.getElementById('slider').value);
  const monto = Number(document.getElementById('monto').value) || 0;
  document.getElementById('sTeam').style.width = t + '%';
  document.getElementById('sOwner').style.width = (100 - t) + '%';
  const fmt = n => '$' + n.toLocaleString('es-AR', {maximumFractionDigits:0});
  document.getElementById('lblTeam').innerHTML = `<b style="color:var(--green)">${t}%</b> equipo` + (monto ? ` · ${fmt(monto*t/100)}` : '');
  document.getElementById('lblOwner').innerHTML = `<b style="color:var(--owner)">${100-t}%</b> vos` + (monto ? ` · ${fmt(monto*(100-t)/100)}` : '');
}
document.getElementById('monto').addEventListener('input', drawSplit);
drawSplit();

async function crear() {
  const btn = document.getElementById('crear');
  const err = document.getElementById('error');
  const out = document.getElementById('resultado');
  err.textContent = ''; out.innerHTML = '';

  const nombre = document.getElementById('nombre').value.trim();
  const cliente = document.getElementById('cliente').value.trim();
  const email = document.getElementById('email').value.trim();
  const monto = Number(document.getElementById('monto').value);

  if (!nombre || !monto) { err.textContent = 'Completá el nombre del proyecto y el monto.'; return; }

  btn.disabled = true; btn.textContent = 'Generando…';
  try {
    const r = await fetch('/api/crear-cobro', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ nombre, cliente, email: email || undefined, monto, recurrente })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error al crear el cobro');

    out.innerHTML = `
      <div class="linkbox">
        <b>Link para el cliente:</b><br>${data.link}
      </div>
      <div class="row">
        <button class="ghost" onclick="navigator.clipboard.writeText('${data.link}')">Copiar link</button>
        <button class="ghost" onclick="window.open('${data.link}','_blank')">Abrir</button>
      </div>`;
  } catch (e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Generar link de pago';
  }
}

async function cargarEstado() {
  const el = document.getElementById('lista');
  el.textContent = 'Cargando…';
  try {
    const r = await fetch('/api/estado-cobros');
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error');
    if (!data.suscripciones.length) { el.textContent = 'Todavía no hay suscripciones.'; return; }
    const colores = { authorized:'var(--green)', pending:'var(--amber)', cancelled:'#B42318' };
    const nombres = { authorized:'PAGANDO', pending:'ESPERANDO TARJETA', cancelled:'CANCELADA' };
    el.innerHTML = data.suscripciones.map(s => `
      <div style="padding:10px 0; border-bottom:1px solid var(--line)">
        <div style="display:flex; justify-content:space-between; color:var(--ink)">
          <span>${s.nombre || s.id}</span>
          <span class="num">$${(s.monto||0).toLocaleString('es-AR')}</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-top:4px">
          <span class="status" style="color:${colores[s.estado]||'var(--mut)'}">${nombres[s.estado]||s.estado}</span>
          <span style="font-size:12px">${s.proximo_cobro ? 'Próx: ' + new Date(s.proximo_cobro).toLocaleDateString('es-AR') : ''}</span>
        </div>
      </div>`).join('');
  } catch (e) {
    el.textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
